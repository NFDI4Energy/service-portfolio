name: gh-pages
on:
  workflow_dispatch:

permissions:
  contents: write
  pages: write
  id-token: write

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/upload-pages-artifact@v4
        with:
          path: |
            index.html
            404.html
      - uses: actions/deploy-pages@v4